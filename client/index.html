<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>One Piece AI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-bg"></div>
    <main class="app-shell">
      <section class="hero-card">
        <div class="hero-copy">
          <span class="badge">OpenAI + Wiki + Web</span>
          <h1>One Piece AI</h1>
          <p>
            Faça perguntas sobre o anime, mangá e live action de One Piece com uma base preparada para usar OpenAI,
            One Piece Wiki e web search.
          </p>
        </div>
        <div class="hero-panel">
          <div class="stat-card">
            <strong>/ask</strong>
            <span>rota pronta</span>
          </div>
          <div class="stat-card">
            <strong>RAG</strong>
            <span>estrutura inicial</span>
          </div>
          <div class="stat-card">
            <strong>Render</strong>
            <span>backend</span>
          </div>
          <div class="stat-card">
            <strong>Vercel</strong>
            <span>frontend</span>
          </div>
        </div>
      </section>

      <section class="chat-card">
        <div class="toolbar">
          <label>
            Modo
            <select id="mode">
              <option value="hybrid">hybrid</option>
              <option value="local">local</option>
              <option value="wiki">wiki</option>
            </select>
          </label>
          <label>
            API Base URL
            <input id="apiBaseUrl" type="text" placeholder="https://seu-backend.onrender.com" />
          </label>
        </div>

        <label class="question-block">
          <span>Sua pergunta</span>
          <textarea
            id="question"
            rows="5"
            placeholder="Ex.: O que muda entre o mangá e o live action no arco de Baratie?"
          ></textarea>
        </label>

        <div class="actions">
          <button id="askButton">Perguntar</button>
        </div>

        <div id="status" class="status"></div>

        <article id="answerCard" class="answer-card hidden">
          <h2>Resposta</h2>
          <div id="answer" class="answer"></div>
          <h3>Fontes recuperadas</h3>
          <div id="sources" class="sources"></div>
        </article>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
